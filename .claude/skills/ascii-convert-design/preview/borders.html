<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
  .card { padding: 18px 20px; gap: 14px; flex-direction: column; justify-content: center; align-items: stretch; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .swatch {
    width: 70px; height: 38px;
    background: var(--abyss);
  }
  .name { font-size: 10px; letter-spacing: 0.06em; color: var(--fg); }
  .val { font-size: 9px; letter-spacing: 0.06em; color: var(--fg-subtle); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="sw"><div class="swatch" style="border:1px solid var(--shadow);"></div><span class="name">subtle</span><span class="val">1px · --shadow</span></div>
    <div class="sw"><div class="swatch" style="border:1px solid var(--slate);"></div><span class="name">base · default</span><span class="val">1px · --slate</span></div>
    <div class="sw"><div class="swatch" style="border:1px solid var(--muted);"></div><span class="name">strong</span><span class="val">1px · --muted</span></div>
    <div class="sw"><div class="swatch" style="border:2px solid var(--violet);"></div><span class="name">accent</span><span class="val">2px · --violet</span></div>
  </div>
</div>
</body>
</html>
