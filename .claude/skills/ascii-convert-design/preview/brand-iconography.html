<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
  .card { padding: 16px 20px; flex-direction: column; gap: 12px; justify-content: center; align-items: stretch; }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .glyph-cell {
    aspect-ratio: 1; min-height: 44px;
    border: 1px solid var(--slate); border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-family: var(--font-mono);
    flex-direction: column; gap: 2px;
  }
  .glyph-cell .g { line-height: 1; }
  .glyph-cell .n { font-size: 8px; color: var(--fg-subtle); letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="glyph-cell" style="color: var(--violet);"><span class="g">⬆</span><span class="n">upload</span></div>
    <div class="glyph-cell" style="color: var(--hot-pink);"><span class="g">◉</span><span class="n">live</span></div>
    <div class="glyph-cell" style="color: var(--fg-muted);"><span class="g">○</span><span class="n">idle</span></div>
    <div class="glyph-cell" style="color: var(--hot-pink);"><span class="g">◎</span><span class="n">capture</span></div>
    <div class="glyph-cell" style="color: var(--hot-pink);"><span class="g">●</span><span class="n">rec</span></div>
    <div class="glyph-cell" style="color: var(--cyan);"><span class="g">⏺</span><span class="n">record</span></div>
    <div class="glyph-cell" style="color: var(--hot-pink);"><span class="g">⏹</span><span class="n">stop</span></div>
    <div class="glyph-cell" style="color: var(--fg-muted);"><span class="g">⇄</span><span class="n">flip</span></div>
  </div>
  <div class="row">
    <div class="glyph-cell" style="color: var(--violet);"><span class="g">◈</span><span class="n">analyze</span></div>
    <div class="glyph-cell" style="color: var(--violet);"><span class="g">⚿</span><span class="n">api key</span></div>
    <div class="glyph-cell" style="color: var(--hot-pink);"><span class="g">✕</span><span class="n">close</span></div>
    <div class="glyph-cell" style="color: var(--fg-subtle);"><span class="g">×</span><span class="n">dismiss</span></div>
    <div class="glyph-cell" style="color: var(--electric);"><span class="g">⚠</span><span class="n">warn</span></div>
    <div class="glyph-cell" style="color: var(--violet);"><span class="g">▸</span><span class="n">scan</span></div>
    <div class="glyph-cell" style="color: var(--cyan);"><span class="g">→</span><span class="n">link</span></div>
    <div class="glyph-cell" style="color: var(--fg-muted);"><span class="g">—</span><span class="n">sep</span></div>
  </div>
</div>
</body>
</html>
