<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
  .card { padding: 18px 20px; gap: 14px; flex-direction: column; justify-content: center; align-items: stretch; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .swatch {
    width: 56px; height: 56px;
    background: var(--bg-accent-soft);
    border: 1px solid var(--violet);
  }
  .name { font-size: 10px; letter-spacing: 0.06em; color: var(--fg); }
  .val { font-size: 9px; letter-spacing: 0.06em; color: var(--fg-subtle); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="sw"><div class="swatch" style="border-radius:0;"></div><span class="name">none</span><span class="val">0px</span></div>
    <div class="sw"><div class="swatch" style="border-radius:2px;"></div><span class="name">xs · default</span><span class="val">2px</span></div>
    <div class="sw"><div class="swatch" style="border-radius:4px;"></div><span class="name">sm · modals</span><span class="val">4px</span></div>
    <div class="sw"><div class="swatch" style="border-radius:6px;"></div><span class="name">md</span><span class="val">6px</span></div>
    <div class="sw"><div class="swatch" style="border-radius:999px;"></div><span class="name">pill · dots only</span><span class="val">999px</span></div>
  </div>
</div>
</body>
</html>
