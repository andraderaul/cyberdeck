<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
  .card { padding: 18px 24px; gap: 6px; flex-direction: column; justify-content: center; }
  .row {
    display: grid; grid-template-columns: 90px 1fr 70px;
    align-items: baseline; gap: 12px; padding: 5px 0;
    border-bottom: 1px dashed var(--shadow);
  }
  .row:last-child { border-bottom: none; }
  .meta { font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.06em; text-transform: uppercase; }
  .sample { font-size: 16px; color: var(--fg); }
  .name { font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.06em; text-align: right; }
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="meta">regular · 400</span><span class="sample" style="font-weight:400;">load source · render frame · export png</span><span class="name">--weight-regular</span></div>
  <div class="row"><span class="meta">medium · 500</span><span class="sample" style="font-weight:500;">load source · render frame · export png</span><span class="name">--weight-medium</span></div>
  <div class="row"><span class="meta">semibold · 600</span><span class="sample" style="font-weight:600;">load source · render frame · export png</span><span class="name">--weight-semibold</span></div>
  <div class="row"><span class="meta">bold · 700</span><span class="sample" style="font-weight:700;">load source · render frame · export png</span><span class="name">--weight-bold</span></div>
</div>
</body>
</html>
