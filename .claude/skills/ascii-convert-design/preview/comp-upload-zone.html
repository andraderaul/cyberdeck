<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
  .card { padding: 12px 16px; gap: 10px; flex-direction: column; justify-content: center; align-items: stretch; }
  .tabs { display: flex; gap: 4px; }
  .tab {
    flex: 1; padding: 8px;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em;
    border: 1px solid var(--slate); border-radius: 2px;
    background: transparent; color: var(--fg-muted);
    text-align: center; cursor: pointer;
  }
  .tab.active { border-color: var(--violet); background: var(--bg-accent-soft); color: var(--violet); }
  .drop {
    border: 1px solid var(--slate); border-radius: 2px;
    padding: 18px; display: flex; flex-direction: column; gap: 6px;
    align-items: center; justify-content: center;
    min-height: 80px;
  }
  .drop .glyph { font-size: 22px; color: var(--violet); }
  .drop .cta { font-size: 12px; color: var(--fg); }
  .drop .meta { font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <div class="tabs">
    <div class="tab active">↑ upload</div>
    <div class="tab">◉ webcam</div>
  </div>
  <div class="drop">
    <span class="glyph">⬆</span>
    <span class="cta">drag &amp; drop or click to upload</span>
    <span class="meta">jpg · png · webp</span>
  </div>
</div>
</body>
</html>
