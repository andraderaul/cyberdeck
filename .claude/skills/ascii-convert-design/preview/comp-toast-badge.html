<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
  .card { padding: 20px; gap: 12px; flex-direction: column; justify-content: center; align-items: stretch; }
  .toast {
    display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px;
    background: var(--shadow); border: 1px solid var(--hot-pink); border-radius: 2px;
    box-shadow: 0 0 12px rgba(255, 45, 120, 0.15);
    min-width: 260px; max-width: 360px;
    font-family: var(--font-mono); font-size: 11px; color: var(--ghost);
  }
  .toast .glyph { color: var(--hot-pink); flex-shrink: 0; }
  .toast .body { flex: 1; }
  .toast .dismiss { color: var(--fg-subtle); cursor: pointer; flex-shrink: 0; }

  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    color: var(--cyan); font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.04em; padding: 2px 8px;
    background: var(--bg-info-ghost); border: 1px solid rgba(0, 229, 255, 0.2);
  }
</style>
</head>
<body>
<div class="card">
  <div class="toast">
    <span class="glyph">⚠</span>
    <span class="body">PNG Export failed — try again or reduce resolution</span>
    <span class="dismiss">×</span>
  </div>
  <div class="badges">
    <span class="badge">#draped_subject</span>
    <span class="badge">#head_bowed</span>
    <span class="badge">#identity_veiled</span>
    <span class="badge">#low_motion</span>
  </div>
</div>
</body>
</html>
