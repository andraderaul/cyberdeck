<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
  .card { padding: 18px 24px; gap: 4px; flex-direction: column; justify-content: center; }
  .row {
    display: grid; grid-template-columns: 50px 1fr 130px;
    align-items: baseline; gap: 12px; padding: 4px 0;
    border-bottom: 1px dashed var(--shadow);
  }
  .row:last-child { border-bottom: none; }
  .size { font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.08em; }
  .sample { color: var(--fg); }
  .name { font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.06em; text-align: right; }
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="size">48</span><span class="sample" style="font-size:48px; line-height:1; font-weight:700; color:var(--violet); letter-spacing:0.08em;">Aa</span><span class="name">--text-2xl</span></div>
  <div class="row"><span class="size">32</span><span class="sample" style="font-size:32px; line-height:1; font-weight:700; letter-spacing:0.04em;">Heading XL</span><span class="name">--text-xl</span></div>
  <div class="row"><span class="size">24</span><span class="sample" style="font-size:24px; line-height:1.2;">Heading LG</span><span class="name">--text-lg</span></div>
  <div class="row"><span class="size">18</span><span class="sample" style="font-size:18px;">Heading MD</span><span class="name">--text-md</span></div>
  <div class="row"><span class="size">15</span><span class="sample" style="font-size:15px;">body — default paragraph copy</span><span class="name">--text-base</span></div>
  <div class="row"><span class="size">13</span><span class="sample" style="font-size:13px;">small — button + control label</span><span class="name">--text-sm</span></div>
  <div class="row"><span class="size">11</span><span class="sample" style="font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-muted);">xs · label / meta</span><span class="name">--text-xs</span></div>
</div>
</body>
</html>
