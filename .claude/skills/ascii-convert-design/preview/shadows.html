<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
  .card { padding: 18px 20px; gap: 14px; flex-direction: column; justify-content: center; align-items: stretch; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; align-items: center; }
  .sw { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .thumb {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--violet); border: 2px solid var(--void);
    box-shadow: 0 0 6px var(--violet);
  }
  .toast {
    width: 160px; padding: 8px 10px; background: var(--shadow);
    border: 1px solid var(--hot-pink); border-radius: 2px;
    box-shadow: 0 0 12px rgba(255, 45, 120, 0.25);
    font-size: 10px; color: var(--fg); display: flex; gap: 6px;
  }
  .toast .glyph { color: var(--hot-pink); }
  .threat {
    font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: var(--hot-pink);
    text-shadow: 0 0 8px var(--hot-pink);
  }
  .name { font-size: 10px; letter-spacing: 0.06em; color: var(--fg); }
  .val { font-size: 9px; letter-spacing: 0.04em; color: var(--fg-subtle); text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="sw">
      <div class="thumb"></div>
      <span class="name">slider thumb glow</span>
      <span class="val">0 0 6px var(--violet)</span>
    </div>
    <div class="sw">
      <div class="toast"><span class="glyph">⚠</span><span>render failed</span></div>
      <span class="name">toast halo</span>
      <span class="val">0 0 12px rgba(255,45,120,.15)</span>
    </div>
    <div class="sw">
      <div class="threat">CRITICAL</div>
      <span class="name">critical text glow</span>
      <span class="val">0 0 8px var(--hot-pink)</span>
    </div>
  </div>
</div>
</body>
</html>
