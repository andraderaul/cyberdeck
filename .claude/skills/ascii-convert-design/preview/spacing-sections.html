<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
  .card { padding: 18px 20px; gap: 8px; flex-direction: column; justify-content: center; }
  .row { display: grid; grid-template-columns: 70px 1fr 70px; align-items: center; gap: 12px; padding: 2px 0; }
  .bar { background: linear-gradient(90deg, var(--cyan), var(--violet)); height: 14px; border-radius: 1px; max-width: 100%; }
  .name { font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.06em; text-align: right; }
  .key { font-size: 11px; color: var(--fg); font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="key">xs · 16</span><div class="bar" style="width:16px;"></div><span class="name">--sp-xs</span></div>
  <div class="row"><span class="key">sm · 32</span><div class="bar" style="width:32px;"></div><span class="name">--sp-sm</span></div>
  <div class="row"><span class="key">md · 64</span><div class="bar" style="width:64px;"></div><span class="name">--sp-md</span></div>
  <div class="row"><span class="key">lg · 96</span><div class="bar" style="width:96px;"></div><span class="name">--sp-lg</span></div>
  <div class="row"><span class="key">xl · 128</span><div class="bar" style="width:128px;"></div><span class="name">--sp-xl</span></div>
  <div class="row"><span class="key">2xl · 160</span><div class="bar" style="width:160px;"></div><span class="name">--sp-2xl</span></div>
</div>
</body>
</html>
