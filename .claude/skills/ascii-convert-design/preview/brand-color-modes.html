<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
  .card { padding: 16px 20px; flex-direction: column; gap: 10px; justify-content: center; align-items: stretch; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  pre {
    margin: 0; font-family: var(--font-mono); font-size: 9px; line-height: 1.05;
    padding: 10px; border: 1px solid var(--slate); border-radius: 2px;
    background: var(--void); white-space: pre; overflow: hidden;
    height: 96px;
  }
  .lbl { font-size: 10px; letter-spacing: 0.08em; color: var(--fg-muted); }
  .matrix pre { color: #00ff66; }
  .neon pre { color: var(--hot-pink); }
  .retro pre { color: #ff8c00; }
  .bw pre { color: var(--ghost); }
  .sepia pre { color: #a0522d; }
  .original pre { color: var(--cyan); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="sw matrix">
      <span class="lbl">matrix</span>
<pre>  .^!*&lt;&amp;%$#@
 .^!*&lt;&amp;%$#@.
.^!*&lt;&amp;%$#@.^
 .^!*&lt;&amp;%$#@.
  .^!*&lt;&amp;%$#@</pre>
    </div>
    <div class="sw neon">
      <span class="lbl">neon</span>
<pre>  .^!*&lt;&amp;%$#@
 .^!*&lt;&amp;%$#@.
.^!*&lt;&amp;%$#@.^
 .^!*&lt;&amp;%$#@.
  .^!*&lt;&amp;%$#@</pre>
    </div>
    <div class="sw retro">
      <span class="lbl">retro</span>
<pre>  .^!*&lt;&amp;%$#@
 .^!*&lt;&amp;%$#@.
.^!*&lt;&amp;%$#@.^
 .^!*&lt;&amp;%$#@.
  .^!*&lt;&amp;%$#@</pre>
    </div>
  </div>
</div>
</body>
</html>
