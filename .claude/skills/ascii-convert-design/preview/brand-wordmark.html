<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
  .card { padding: 0; background: transparent; border: none; }
  .stage {
    width: 100%; min-height: 100%;
    background: var(--void); border: 1px solid var(--slate); border-radius: 2px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 22px;
  }
  .wm { font-family: var(--font-display); font-size: 52px; font-weight: 700; letter-spacing: 0.18em; color: var(--violet); line-height: 1; }
  .tag { font-size: 11px; letter-spacing: 0.12em; color: var(--fg-subtle); text-transform: uppercase; }
</style>
</head>
<body>
<div class="card">
  <div class="stage">
    <div class="wm">ASCII//CONVERT</div>
    <div class="tag">image → ascii art</div>
  </div>
</div>
</body>
</html>
