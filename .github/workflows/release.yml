name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run check

      - run: npm run test:run

      - run: npm run build

      # Opens/updates a "Version Packages" PR while changesets are pending; on merge of
      # that PR there are none left, so this run tags the released versions instead.
      - uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
