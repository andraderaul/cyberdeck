name: CI

on:
  push:
    branches: [main]
  pull_request:
    # `feat/**` so a stack of PRs merging into a long-lived feature branch is gated the same way
    # as one merging into main — without it the sub-PRs of a stack land entirely unchecked.
    branches: [main, 'feat/**']

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:run

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
