name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Documentation-only PRs get no signal from Test or Build, so skip them entirely.
    # `**.md` already covers docs/**/*.md; `docs/**` catches non-markdown assets in that tree.
    #
    # Safe only while `main` has NO required status checks. With required checks, a filtered-out
    # workflow never reports and the PR blocks forever on "Expected — waiting for status to be
    # reported". If required checks are ever enabled, replace this filter with the skip-job
    # pattern (a job matching the ignored paths that reports success) rather than deleting it.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".changeset/**"
      - "LICENSE"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:run

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
